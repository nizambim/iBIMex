:root{

--secondary:#1E88E5;
--light:#F5F7FA;

}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
line-height:1.6;
color:#333;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

header{
background:white;
position:fixed;
width:100%;
top:0;
z-index:1000;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 0;
}

.logo{
font-size:28px;
font-weight:bold;
color:var(--primary);
}

.nav-menu{
display:flex;

}

font-weight:600;

.hero{

linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url('https://images.unsplash.com/photo-1503387762-592deb58ef4e');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:60px;
margin-bottom:20px;
}

.hero p{
font-size:20px;
max-width:800px;
margin:auto;
margin-bottom:30px;
}

.btn{
display:inline-block;
padding:12px 25px;
background:var(--secondary);
color:white;
text-decoration:none;
border-radius:5px;
}

section{
padding:80px 0;
}

.section-title{
text-align:center;
margin-bottom:50px;
}

.cards{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
padding:30px;
background:white;
border-radius:10px;
box-shadow:0 3px 15px rgba(0,0,0,.1);
